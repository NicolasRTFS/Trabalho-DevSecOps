name: AcervoHub DevSecOps Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test-and-sast:
    name: Tests, SAST, SCA and Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit semgrep
          pip install --force-reinstall -r requirements.txt
          python - <<'PY'
          import fastapi
          import starlette
          print("fastapi", fastapi.__version__)
          print("starlette", starlette.__version__)
          PY

      - name: Run automated tests
        env:
          DATABASE_URL: sqlite:////tmp/acervo_hub_ci.sqlite3
          SECRET_KEY: ci-test-secret
          SEED_DATABASE: "false"
          PASSWORD_HASH_ROUNDS: "4"
        run: pytest --junitxml=reports/pytest-junit.xml

      - name: Secret Detection with Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --report-format=json \
            --report-path=/repo/reports/gitleaks.json \
            --no-git || true
          test -f reports/gitleaks.json || echo '{"findings":[]}' > reports/gitleaks.json

      - name: SCA with pip-audit
        continue-on-error: true
        run: pip-audit -r requirements.txt --format json --output reports/pip-audit.json

      - name: SAST with Bandit
        continue-on-error: true
        run: bandit -r app -f json -o reports/bandit.json

      - name: SAST with Semgrep
        continue-on-error: true
        run: semgrep scan --config p/python --config p/owasp-top-ten --json --output reports/semgrep.json

      - name: Upload code analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-security-reports
          path: reports/
          if-no-files-found: warn

  iac-and-container:
    name: IaC and Container Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: IaC scan with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          output_format: cli,json
          output_file_path: console,reports/checkov.json
          soft_fail: true

      - name: Ensure Checkov report exists
        if: always()
        run: test -f reports/checkov.json || echo '{"results":{}}' > reports/checkov.json

      - name: Build application image
        run: docker build -t acervohub:${{ github.sha }} .

      - name: Container and filesystem scan with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/reports:/reports" \
            aquasec/trivy:latest image \
            --format json \
            --output /reports/trivy-image.json \
            --vuln-type os,library \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --exit-code 0 \
            acervohub:${{ github.sha }} || true
          test -f reports/trivy-image.json || echo '{"Results":[]}' > reports/trivy-image.json

      - name: Upload IaC and container reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-security-reports
          path: reports/
          if-no-files-found: warn

  dast:
    name: DAST with OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Start AcervoHub stack
        run: docker compose up --build -d

      - name: Wait for application health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: DAST baseline scan with OWASP ZAP
        run: |
          docker run --rm \
            --network host \
            -v "$PWD/reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:8000 \
            -a \
            -r zap-baseline.html \
            -J zap-baseline.json || true
          test -f reports/zap-baseline.html || echo '<html><body>ZAP report was not generated.</body></html>' > reports/zap-baseline.html
          test -f reports/zap-baseline.json || echo '{}' > reports/zap-baseline.json

      - name: Stop AcervoHub stack
        if: always()
        run: docker compose down -v

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-security-reports
          path: reports/
          if-no-files-found: warn
